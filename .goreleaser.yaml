# GoReleaser config for runeward. See https://goreleaser.com
#
# Local dry run (no publish):   goreleaser release --snapshot --clean
# Real release (on a git tag):  goreleaser release --clean
#
# This produces archives named runeward_<os>_<arch>.tar.gz (matching install.sh),
# a checksums.txt, SBOMs, and a Homebrew formula.
version: 2

project_name: runeward

# The repo tracks a committed dist/ (MCP manifest, SKILL.md). GoReleaser's
# default output dir is also "dist" and `--clean` would delete those tracked
# files, leaving a dirty tree that aborts the release. Use a separate dir.
dist: dist-release

before:
  hooks:
    # Use download (not tidy) so the working tree stays clean; goreleaser
    # refuses to release from a dirty git state.
    - go mod download

builds:
  - id: runeward
    main: ./cmd/runeward
    binary: runeward
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/Runewardd/runeward/internal/cli.version={{ .Version }}

  - id: runeward-egress
    main: ./cmd/runeward-egress
    binary: runeward-egress
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/Runewardd/runeward/internal/cli.version={{ .Version }}

  - id: runeward-agent
    main: ./cmd/runeward-agent
    binary: runeward-agent
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/Runewardd/runeward/internal/cli.version={{ .Version }}

archives:
  - id: runeward
    ids: [runeward]
    name_template: "runeward_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    # Ship an idiomatic zip on Windows; keep tar.gz elsewhere.
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - README.md
  - id: runeward-egress
    ids: [runeward-egress]
    name_template: "runeward-egress_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
  - id: runeward-agent
    ids: [runeward-agent]
    name_template: "runeward-agent_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

# Keyless cosign signature over checksums.txt. Because every archive and SBOM is
# listed in checksums.txt, one signature transitively covers them all. Requires
# cosign on PATH and an OIDC token (id-token: write) in the release workflow.
#
# Verify with:
#   cosign verify-blob --certificate checksums.txt.pem \
#     --signature checksums.txt.sig \
#     --certificate-identity-regexp 'https://github.com/Runewardd/runeward' \
#     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com' \
#     checksums.txt
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    signature: "${artifact}.sig"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: Runewardd
    name: runeward
  draft: false
  prerelease: auto
  # Re-running a tag (e.g. after fixing a later job) must not fail on assets a
  # prior partial run already uploaded. Replace same-named assets instead of
  # erroring with "422 already_exists".
  replace_existing_artifacts: true

# Homebrew formula -> brew install Runewardd/tap/runeward
#
# Uploading to the tap requires a repo secret HOMEBREW_TAP_TOKEN (a PAT with
# write access to Runewardd/homebrew-tap), passed as env in the release
# workflow. The skip_upload guard below means: if that token isn't set, the
# formula is still built but not pushed, so a release never fails on it.
brews:
  - name: runeward
    skip_upload: '{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}'
    repository:
      owner: Runewardd
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    ids: [runeward]
    homepage: "https://github.com/Runewardd/runeward"
    description: "Governed execution cells for AI agents"
    license: "Apache-2.0"
    test: |
      system "#{bin}/runeward", "version"
