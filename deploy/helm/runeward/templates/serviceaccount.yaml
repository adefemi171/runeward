{{- if .Values.serviceAccount.create -}}
{{- $legacyName := .Values.serviceAccount.name -}}
{{- $controllerSA := default (default (printf "%s-controller" (include "runeward.fullname" .)) $legacyName) .Values.serviceAccount.controller.name -}}
{{- $serverSA := default (default (printf "%s-server" (include "runeward.fullname" .)) $legacyName) .Values.serviceAccount.server.name -}}
{{- $webhookSA := default (default (printf "%s-webhook" (include "runeward.fullname" .)) $legacyName) .Values.serviceAccount.webhook.name -}}
{{- if .Values.controller.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $controllerSA }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "runeward.labels" . | nindent 4 }}
    app.kubernetes.io/component: controller
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.server.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $serverSA }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "runeward.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- if .Values.webhook.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $webhookSA }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "runeward.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
