{{- if .Values.server.enabled -}}
{{- $serverSA := default (default (printf "%s-server" (include "runeward.fullname" .)) .Values.serviceAccount.name) .Values.serviceAccount.server.name -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runeward.fullname" . }}-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "runeward.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      {{- include "runeward.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "runeward.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ $serverSA }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: {{ include "runeward.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - serve
            - --port={{ .Values.server.port }}
            {{- if .Values.server.noUI }}
            - --no-ui
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
          env:
            - name: RUNEWARD_K8S_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: RUNEWARD_CONFIG_DIR
              value: /etc/runeward/profiles
            - name: RUNEWARD_STATE_DIR
              value: {{ .Values.stateDir | quote }}
            - name: RUNEWARD_EGRESS_IMAGE
              value: {{ .Values.egress.image | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: profiles
              mountPath: /etc/runeward/profiles
              readOnly: true
            - name: state
              mountPath: {{ .Values.stateDir }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
      volumes:
        - name: profiles
          {{- include "runeward.profilesVolume" . | nindent 10 }}
        - name: state
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "runeward.fullname" . }}-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "runeward.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.server.service.type }}
  selector:
    {{- include "runeward.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: {{ .Values.server.service.port }}
      targetPort: http
{{- end }}
