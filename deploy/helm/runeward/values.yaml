# Default values for the runeward chart.

image:
  repository: runeward
  # tag defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # Legacy override applied as fallback to all components when per-component
  # serviceAccount names are not set.
  name: ""
  annotations: {}
  controller:
    name: ""
  server:
    name: ""
  webhook:
    name: ""

rbac:
  create: true

controller:
  enabled: true
  replicas: 1
  workers: 2
  # Keep namespace scope by default; enabling this expands controller RBAC to
  # cluster-wide pod and exec access.
  allNamespaces: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: "1"
      memory: 256Mi

webhook:
  enabled: true
  port: 8443
  # >1 is safe: replicas share one serving cert via a Secret (see cert-secret).
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: "1"
      memory: 256Mi

server:
  enabled: false
  replicas: 1
  port: 8080
  noUI: false
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

# Profiles mounted at /etc/runeward/profiles (filename -> TOML). The chart
# stores them in a Secret by default (profiles can carry secret material).
# Reuse an existing Secret via existingSecret, or an existing ConfigMap via
# existingConfigMap (backward compatible). See docs for the profile schema.
profiles:
  create: false
  existingSecret: ""
  existingConfigMap: ""
  data: {}

egress:
  image: runeward-egress:latest

# Opt-in default-deny NetworkPolicy for the control-plane namespace. Off by
# default: it only takes effect under a CNI that enforces NetworkPolicy, and a
# default-deny stance can surprise single-tenant operators. When enabled it
# denies all traffic, then allows intra-namespace ingress to the server/webhook
# ports plus egress to DNS and the Kubernetes API. Per-sandbox pods get their
# own in-cluster deny policy from the server via RUNEWARD_K8S_NETWORK_POLICY.
networkPolicy:
  enabled: false

# Pod Security Admission level applied to the runeward-managed namespace that
# hosts sandbox pods. The strict-egress sidecar needs NET_ADMIN, which the
# "baseline"/"restricted" levels forbid at enforcement time, so enforce defaults
# to "privileged" while warn/audit stay at "baseline" to surface violations
# without breaking egress. Set enforce to baseline/restricted only if you don't
# use strict egress. Maps to RUNEWARD_K8S_PSA_ENFORCE on the server/controller.
podSecurityStandard:
  enforce: privileged
  warn: baseline
  audit: baseline

stateDir: /var/lib/runeward

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
