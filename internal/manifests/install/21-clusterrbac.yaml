apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: runeward-controller
  labels:
    app.kubernetes.io/name: runeward
rules:
  # Reconcile the cluster-scoped custom resources and their status.
  - apiGroups: ["runeward.dev"]
    resources: ["clustersandboxes", "clusterfleets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["runeward.dev"]
    resources: ["clustersandboxes/status", "clusterfleets/status"]
    verbs: ["get", "update", "patch"]
  # The k8s backend calls ensureNamespace (get + best-effort PSA-label patch,
  # and create when provisioning into a namespace that does not yet exist).
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: runeward-controller
  labels:
    app.kubernetes.io/name: runeward
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: runeward-controller
subjects:
  - kind: ServiceAccount
    name: runeward-controller
    namespace: runeward
