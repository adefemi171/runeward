name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  # Required for cosign keyless (Fulcio/Rekor) signing via GitHub OIDC.
  id-token: write

env:
  REGISTRY: ghcr.io

jobs:
  # GoReleaser builds the cross-platform binaries, archives, checksums.txt and
  # SBOMs, and creates the GitHub Release for the tag.
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      # syft powers the SBOM generation configured in .goreleaser.yaml.
      - uses: anchore/sbom-action/download-syft@v0
      # cosign signs checksums.txt (keyless) as configured in .goreleaser.yaml.
      - uses: sigstore/cosign-installer@v3
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to Runewardd/homebrew-tap. If the secret is
          # unset this is empty and the Homebrew upload is skipped (see the
          # skip_upload guard in .goreleaser.yaml), so releases still succeed.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  images:
    runs-on: ubuntu-latest
    # Don't upload the build-record (*.dockerbuild) artifacts; the release job
    # downloads all artifacts and those records can flake the download step.
    env:
      DOCKER_BUILD_RECORD_UPLOAD: "false"
      DOCKER_BUILD_SUMMARY: "false"
    steps:
      - uses: actions/checkout@v7.0.1
      # GHCR only accepts lowercase repository paths; the org name is mixed-case.
      - name: Compute lowercase image name
        run: echo "IMAGE=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push runeward image
        id: runeward
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:latest
          cache-from: type=gha,scope=runeward
          cache-to: type=gha,mode=max,scope=runeward

      - name: Build & push runeward-egress image
        id: egress
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile.egress
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}-egress:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}-egress:latest
          cache-from: type=gha,scope=runeward-egress
          cache-to: type=gha,mode=max,scope=runeward-egress

      - name: Build & push runeward-agent image
        id: agent
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile.agent
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}-agent:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}-agent:latest
          cache-from: type=gha,scope=runeward-agent
          cache-to: type=gha,mode=max,scope=runeward-agent

      - name: Build & push runeward-sandbox image
        id: sandbox
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/Dockerfile.sandbox
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}-sandbox:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}-sandbox:latest
          cache-from: type=gha,scope=runeward-sandbox
          cache-to: type=gha,mode=max,scope=runeward-sandbox

      # Keyless (Fulcio/Rekor) signature over each image by digest. Signing the
      # digest covers every tag that points at it. Verify with:
      #   cosign verify ghcr.io/runewardd/runeward:<tag> \
      #     --certificate-identity-regexp 'https://github.com/Runewardd/runeward' \
      #     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
      - name: Sign images with cosign (keyless)
        env:
          COSIGN_YES: "true"
          RUNEWARD_DIGEST: ${{ steps.runeward.outputs.digest }}
          EGRESS_DIGEST: ${{ steps.egress.outputs.digest }}
          AGENT_DIGEST: ${{ steps.agent.outputs.digest }}
          SANDBOX_DIGEST: ${{ steps.sandbox.outputs.digest }}
        run: |
          cosign sign "${REGISTRY}/${IMAGE}@${RUNEWARD_DIGEST}"
          cosign sign "${REGISTRY}/${IMAGE}-egress@${EGRESS_DIGEST}"
          cosign sign "${REGISTRY}/${IMAGE}-agent@${AGENT_DIGEST}"
          cosign sign "${REGISTRY}/${IMAGE}-sandbox@${SANDBOX_DIGEST}"

  # Package the Helm chart and attach it to the release GoReleaser created.
  chart:
    needs: [goreleaser]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.2
      - name: Package Helm chart
        run: |
          mkdir -p dist-chart
          helm package deploy/helm/runeward --destination dist-chart \
            --version "${GITHUB_REF_NAME#v}" --app-version "${GITHUB_REF_NAME#v}"
      - name: Attach chart to release
        uses: softprops/action-gh-release@v3
        with:
          files: dist-chart/*.tgz
