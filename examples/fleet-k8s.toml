# A Kubernetes-backed fleet: N sandboxes from one contract sharing an atomic
# task board, each provisioned as a pod by the k8s backend. Use this (rather
# than the container-backed fleet-demo) for ClusterFleet / in-cluster
# controller flows, where there is no Docker daemon to talk to.
#
# The name starts with "fleet-" so it satisfies the allowedProfiles
# ["k8s", "fleet-*"] guardrail in the §6d ClusterPolicy example.
#
#   kubectl apply -f - <<'EOF'
#   apiVersion: runeward.dev/v1alpha1
#   kind: ClusterFleet
#   metadata: { name: shared-crew, labels: { owner: alice } }
#   spec: { profile: fleet-k8s }
#   EOF

[host]
type    = "k8s"
image   = "debian:stable-slim"
workdir = "/workspace"

[fleet]
replicas   = 2
task_board = ["build module A", "build module B", "run integration tests"]

[limits]
max_execs = 500
