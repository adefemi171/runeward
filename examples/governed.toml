# A profile that demonstrates the governance layer: a hard deny rule and a
# human-in-the-loop approval gate, on top of the local Docker backend.
#
#   runeward --config-dir examples serve
#   POST /v1/sandboxes {"profile":"governed"}
#
# Then try a denied command (rm ...) and an approval-gated write (config/...).

[host]
type    = "container"
image   = "debian:stable-slim"
workdir = "/workspace"

# Destructive shell commands are refused outright.
[[policy]]
tool    = "shell"
match   = "rm *"
verdict = "deny"
reason  = "destructive command blocked by policy"

# Writes to protected config files under the workspace require a human to
# approve them. File tools are workspace-confined, so the match targets a
# relative path inside the workspace (an absolute path like /etc/* would be
# rejected before policy ever runs).
[[policy]]
tool    = "file.write"
match   = "config/*"
verdict = "require-approval"
reason  = "writes under config/ must be reviewed by an operator"

[limits]
wall_clock = "30m"
max_execs  = 200
