# A worked autonomous-agent profile with a deny-by-default contract. Sanitized
# template; real operator profiles live in ~/.config/runeward/.
#
#   runeward --config-dir examples print ns-auto
#
# The agent gets a toolchain, a handful of credentials, and a short list of
# hostnames it may talk to. Everything else is denied by default.

[host]
type    = "container"
image   = "ghcr.io/adefemi171/runeward-sandbox:latest"
user    = "agent"        # non-root
workdir = "/workspace"   # starts empty: clone fresh each session

# The agent's own policy file, projected root:root mode 0444 so the non-root
# session can't edit it.
[[file]]
path    = "/etc/claude-code/managed-settings.json"
mode    = "0444"
content = "{ \"permissions\": { \"defaultMode\": \"acceptEdits\" } }"

# Deny everything not named below. (Omitting [network] would be fully open.)
[network]
default = "deny"

[[network.rule]]                 # the model endpoint
verdict  = "allow"
hostname = "api.anthropic.com"

[[network.rule]]                 # the code host: HTTPS git + REST API
verdict  = "allow"
hostname = "dev.azure.com"

[[network.rule]]                 # Go module proxy (build dependency)
verdict  = "allow"
hostname = "proxy.golang.org"

# Per-action authority: writes outside the workspace need a human, and rm -rf is
# always denied.
[[policy]]
tool    = "shell"
match   = "rm -rf*"
verdict = "deny"
reason  = "destructive recursive delete"

[[policy]]
tool    = "file.write"
match   = "/etc/*"
verdict = "require-approval"
reason  = "writing outside the workspace"

# Cost and loop guardrails.
[limits]
wall_clock      = "45m"
max_execs       = 1000
egress_requests = 2000
loop_window     = "60s"
loop_threshold  = 8

# Secrets resolved fresh per invocation, injected into the session env, never
# written under the target's $HOME. (1Password resolution is a later milestone.)
[[env]]
name = "AZURE_DEVOPS_EXT_PAT"
op   = "op://vault/ns-auto/credential"

[audit]
redact = true
